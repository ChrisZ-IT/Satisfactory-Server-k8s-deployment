---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: satisfactory
  name: satisfactory
  namespace: satisfactory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: satisfactory
  strategy: {}
  template:
    metadata:
      labels:
        app: satisfactory
    spec:
      nodeSelector:
        rquiredCPU: high
      volumes:
        - name: satisfactory-gamefiles-volume
          persistentVolumeClaim:
            claimName: satisfactory-gamefiles-pvc
        - name: satisfactory-configs-volume
          persistentVolumeClaim:
            claimName: satisfactory-configs-pvc
        - name: configmap-scripts
          configMap:        
            name: satisfactory-scripts
            defaultMode: 0755
      initContainers:
      - name: init-steamcmd
        image: docker.io/steamcmd/steamcmd:ubuntu
        imagePullPolicy: Always
        command:
          - 'sh'
          - '-c'
          - '/home/ubuntu/scripts/init.sh'
        securityContext:
          allowPrivilegeEscalation: true
        volumeMounts:
        - name: satisfactory-gamefiles-volume
          mountPath: /home/ubuntu/SatisfactoryDedicatedServer
        - name: satisfactory-configs-volume
          mountPath: /home/ubuntu/.config
        - name: configmap-scripts
          mountPath: /home/ubuntu/scripts
      containers:
      - name: satisfactory
        image: docker.io/ubuntu:latest
        imagePullPolicy: Always
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        resources:
          limits:
            cpu: "3"
            memory: "8Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        envFrom:
          - configMapRef:
              name: satisfactory-config
        ports:
        - containerPort: 7777
          name: server-api
          protocol: TCP
        - containerPort: 7777
          name: game-api
          protocol: UDP
        - containerPort: 8888
          name: game-messaging
          protocol: TCP
        command: 
          - 'sh'
          - '-c'
          - '/home/ubuntu/scripts/start.sh'
        volumeMounts:
        - name: satisfactory-gamefiles-volume
          mountPath: /home/ubuntu/SatisfactoryDedicatedServer
        - name: satisfactory-configs-volume
          mountPath: /home/ubuntu/.config
        - name: configmap-scripts
          mountPath: /home/ubuntu/scripts
