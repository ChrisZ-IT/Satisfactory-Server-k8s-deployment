  GameUserSettings.ini: |+
    # DisableSeasonalEvents: Disables Seasonal events if set to 1 (Default: 0)
    # SendGameplayData: Send gameplay metrics to game devs, enabled by default (Default: 1)
    # AutosaveInterval: Number of seconds between auto saves (Default: 300)
    # ServerRestartTimeSlot: Number of Minutes once server starts to restart server (Default: 1440(24h)).
    [/Script/FactoryGame.FGGameUserSettings]
    FG.DisableSeasonalEvents=0
    FG.SendGameplayData=0
    FG.AutosaveInterval=3300.000000
    FG.ServerRestartTimeSlot=1440.000000
