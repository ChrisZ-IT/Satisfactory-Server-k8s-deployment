apiVersion: v1
kind: ConfigMap
metadata:
  name: satisfactory-configmap
  namespace: satisfactory
data:
  Engine.ini: |+
    # The number of autosaves the server should rotate through(Default: 3).
    [/Script/FactoryGame.FGSaveSession]
    mNumRotatingAutosaves=12
    
    # When running on Linux, the server uploads crash reports by default. The developers can then use these crash reports to help pinpoint issues for future patches. 
    [CrashReportClient]
    bImplicitSend=False
    
    
    # Client disconnected for Timeout
    # Client systems with older hardware or slower connections may need a higher connection timeout limit than the default 30 seconds. 
    [/Script/OnlineSubsystemUtils.IpNetDriver]
    InitialConnectTimeout=30.0
    ConnectionTimeout=30.0

    # Server Tick rate: There are three sections of modifications to make. Replace 30 with the desired number of ticks per second (default: 30): 
    [/Script/OnlineSubsystemUtils.IpNetDriver]
    NetServerMaxTickRate=30
    LanServerMaxTickRate=30

    [/Script/SocketSubsystemEpic.EpicNetDriver]
    NetServerMaxTickRate=30
    LanServerMaxTickRate=30

    [/Script/Engine.Engine]
    NetClientTicksPerSecond=30
    
    # Default auto generated config

    [Internationalization]
    Culture=en_US

    [/Script/Engine.Player]
    ConfiguredInternetSpeed=120000
    ConfiguredLanSpeed=130000

    [/Script/OnlineSubsystemUtils.IpNetDriver]
    MaxClientRate=120000
    MaxInternetClientRate=120000

    [/Script/SteamSockets.SteamSocketsNetDriver]
    MaxClientRate=120000
    MaxInternetClientRate=120000

    [/Script/SocketSubsystemEOS.NetDriverEOSBase]
    MaxClientRate=120000
    MaxInternetClientRate=120000

